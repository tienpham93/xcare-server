version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: xcare-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Helper service to automatically pull required models on startup
  model-puller:
    image: curlimages/curl:latest
    container_name: ollama-model-puller
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      echo 'Waiting for Ollama at http://ollama:11434...'
      until curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 5
      done
      echo 'Pulling llama3 model (this may take a few minutes)...'
      curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3\"}'
      echo 'Pulling mxbai-embed-large model...'
      curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"mxbai-embed-large\"}'
      echo 'Ollama models are initialized and ready!'
      "

volumes:
  postgres_data:
  ollama_data:
