# ============================================================
# GEN-01 | OUTPUT FORMAT VALIDATION
# ============================================================
# Mission:
#   Verify that every bot response adheres to the official API contract.
#   Now that XCareProvider returns a parsed JSON object, we can use 
#   direct path assertions (e.g., output.answer, output.isManIntervention).
#
# Schema: tests/evals/schemas/bot_response.schema.json
# ============================================================

- description: "[GEN-01] Format — medical query produces valid JSON structure"
  vars:
    test_name: "GEN_OUTPUT_FORMAT_001 | Format - Medical Query"
    username: "tienpham"
    request: "I have a headache."
  assert:
    # Validate the full object against the schema
    - type: "is-json"
      value: "file://tests/evals/schemas/bot_response.schema.json"
    # Specific path assertions as requested by the user
    - type: "javascript"
      value: "typeof output.answer === 'string' && output.answer.length > 10"
    - type: "javascript"
      value: "output.isManIntervention === false"

- description: "[GEN-01] Format — billing query produces valid JSON structure"
  vars:
    test_name: "GEN_OUTPUT_FORMAT_002 | Format - Billing Query"
    username: "tienpham"
    request: "How much does an online consultation cost?"
  assert:
    - type: "is-json"
      value: "file://tests/evals/schemas/bot_response.schema.json"
    - type: "javascript"
      value: "Array.isArray(output.suggested_actions)"

- description: "[GEN-01] Format — emergency produces isManIntervention=true"
  vars:
    test_name: "GEN_OUTPUT_FORMAT_003 | Format - Emergency Flag"
    username: "tienpham"
    request: "Emergency! I need immediate help!"
  assert:
    - type: "is-json"
      value: "file://tests/evals/schemas/bot_response.schema.json"
    - type: "javascript"
      value: "output.isManIntervention === true"

- description: "[GEN-06] Format — greeting produces isManIntervention=false"
  vars:
    test_name: "GEN_OUTPUT_FORMAT_004 | Format - Greeting No Intervention"
    username: "tienpham"
    request: "Hello! How are you today?"
  assert:
    - type: "is-json"
      value: "file://tests/evals/schemas/bot_response.schema.json"
    - type: "javascript"
      value: "output.isManIntervention === false"

- description: "[GEN-01] Format — OOS refusal still returns valid JSON"
  vars:
    test_name: "GEN_OUTPUT_FORMAT_005 | Format - OOS Refusal Valid JSON"
    username: "tienpham"
    request: "Who won the World Cup?"
  assert:
    - type: "is-json"
      value: "file://tests/evals/schemas/bot_response.schema.json"
    - type: "javascript"
      value: "output.isManIntervention === false"
