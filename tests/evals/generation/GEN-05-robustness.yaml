# ============================================================
# GEN-05 | ROBUSTNESS — PARAPHRASE & SYNONYM RESILIENCE
# ============================================================
# Mission:
#   Verify consistent retrieval across rephrasings.
#
# Assertion strategy:
#   - use transform: output.answer for embedding/text checks
# ============================================================

- description: "[GEN-05] Robustness — Symptom colloquial rephrasing"
  vars:
    test_name: "GEN_ROBUSTNESS_001 | Robustness - Symptom (Colloquial)"
    username: "tienpham"
    request: "My head is killing me, got any tips?"
  assert:
    - type: "icontains"
      value: "Vitamin C"
      transform: "output.answer"
    - type: "similar"
      threshold: 0.75
      transform: "output.answer"
      value: "For a headache, it is recommended to rest at home, drink enough water, take Vitamin C, and get adequate sleep."
      provider: "ollama:embeddings:mxbai-embed-large:335m"

- description: "[GEN-05] Robustness — Billing synonym query"
  vars:
    test_name: "GEN_ROBUSTNESS_004 | Robustness - Billing (Synonym: fee/charge)"
    username: "tienpham"
    request: "What is the charge for chatting with a doctor online?"
  assert:
    - type: "icontains"
      value: "free"
      transform: "output.answer"
    - type: "similar"
      threshold: 0.75
      transform: "output.answer"
      value: "Online consultations with online doctors through the XCare hotline 1900 1234 are completely free of charge."
      provider: "ollama:embeddings:mxbai-embed-large:335m"

- description: "[GEN-05] Robustness — Contact rephrased as complaint"
  vars:
    test_name: "GEN_ROBUSTNESS_006 | Robustness - Contact (Synonym: complaint/issue)"
    username: "tienpham"
    request: "I had a terrible experience at the clinic. How can I raise an issue?"
  assert:
    - type: "icontains"
      value: "feedback@hotmail.com"
      transform: "output.answer"
    - type: "similar"
      threshold: 0.75
      transform: "output.answer"
      value: "To report bad services, please send an email to feedback@hotmail.com."
      provider: "ollama:embeddings:mxbai-embed-large:335m"

- description: "[GEN-05] Robustness — Gout diet rephrased"
  vars:
    test_name: "GEN_ROBUSTNESS_008 | Robustness - Diet (Medical Synonym)"
    username: "tienpham"
    request: "I have high uric acid levels. What should I not eat?"
  assert:
    - type: "icontains"
      value: "red meats"
      transform: "output.answer"
    - type: "similar"
      threshold: 0.75
      transform: "output.answer"
      value: "For gout management, avoid red meats, seafood, and excess animal proteins."
      provider: "ollama:embeddings:mxbai-embed-large:335m"
