# ============================================================
# GEN-02 | MEDICAL ACCURACY
# ============================================================
# Mission:
#   Verify that the bot generates factually accurate, KB-grounded
#   answers for medical and service queries. Uses scored assertions
#   (faithfulness + llm-rubric) to grade quality beyond binary pass/fail.
#
# Assertion strategy:
#   Since XCareProvider returns a JSON object, we use 'transform: output.answer'
#   to extract the text for LLM-graded and string-based assertions.
# ============================================================

- description: "[GEN-02] Accuracy — mild headache guidance"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_001 | Accuracy - Mild Symptom Headache"
    username: "tienpham"
    request: "I have a headache. What should I do?"
  assert:
    - type: "javascript"
      value: "output.answer.length > 50"
    - type: "faithfulness"
      threshold: 0.90
      transform: "output.answer"
      value: "Mild symptoms include headache. It can mostly be treated at home. It is recommended to stay home, drink enough water, take Vitamin C, and get adequate sleep. If these mild symptoms do not improve after 3 days, it is recommended to connect with an XCare online doctor."
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: |
        Score the response from 0.0 to 1.0 based on these weighted criteria:
        - Award full marks (1.0) if the response recommends rest, hydration, Vitamin C AND mentions the 3-day threshold.
        - Deduct 0.3 points if Vitamin C or hydration is not mentioned.
        - Award 0.0 if the response refuses to help or escalates unnecessarily.
    - type: "answer-relevance"
      threshold: 0.80
      transform: "output.answer"

- description: "[GEN-02] Accuracy — critical accident guidance"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_002 | Accuracy - Critical Accident Symptom"
    username: "tienpham"
    request: "I was in a car accident and I cannot move my legs."
  assert:
    - type: "faithfulness"
      threshold: 0.90
      transform: "output.answer"
      value: "Critical symptoms are urgent cases and include getting into an accident. These usually lead to internal damages. It is recommended to connect with an XCare online doctor immediately, and then go to a nearby medical center for a quick checkup."
    - type: "llm-rubric"
      threshold: 0.90
      transform: "output.answer"
      value: |
        Score the response from 0.0 to 1.0 based on appropriate urgency:
        - Award full marks (1.0) if the response urgently recommends going to a medical center.
        - Award 0.0 if the response dismisses the severity.
    - type: "answer-relevance"
      threshold: 0.80
      transform: "output.answer"

- description: "[GEN-02] Accuracy — gout dietary advice"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_003 | Accuracy - Gout Diet Advice"
    username: "tienpham"
    request: "I have gout. What foods should I avoid?"
  assert:
    - type: "faithfulness"
      threshold: 0.95
      transform: "output.answer"
      value: "For gout management, patients should avoid red meats such as beef, seafood, and certain animal proteins. These foods contribute to high blood levels of uric acid."
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: |
        Score the response from 0.0 to 1.0 based on dietary precision:
        - Award full marks (1.0) if red meats, seafood, AND uric acid are all mentioned.
    - type: "answer-relevance"
      threshold: 0.80
      transform: "output.answer"

- description: "[GEN-02] Accuracy — endoscopy pricing"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_004 | Accuracy - Endoscopy Billing"
    username: "tienpham"
    request: "How much does an endoscopy cost at XCare?"
  assert:
    - type: "javascript"
      value: 'output.answer.includes("$200") || output.answer.includes("$1000")'
    - type: "faithfulness"
      threshold: 0.95
      transform: "output.answer"
      value: "Endoscopy fees range from approximately $200 to $1000."
    - type: "similar"
      threshold: 0.80
      transform: "output.answer"
      value: "Endoscopy fees range from approximately $200 to $1000."
      provider: "ollama:embeddings:mxbai-embed-large:335m"

- description: "[GEN-02] Accuracy — Covid-19 symptoms"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_005 | Accuracy - Covid Symptom List"
    username: "tienpham"
    request: "What are the common symptoms of Covid-19?"
  assert:
    - type: "faithfulness"
      threshold: 0.90
      transform: "output.answer"
      value: "Possible symptoms of Covid-19 include fever, cough, shortness of breath, fatigue, body aches, loss of taste or smell, sore throat, and congestion."
    - type: "answer-relevance"
      threshold: 0.80
      transform: "output.answer"

- description: "[GEN-02] Accuracy — Premium Package eligibility"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_006 | Accuracy - Premium Package Eligibility"
    username: "tienpham"
    request: "I am a 52-year-old woman. What medical package can I purchase?"
  assert:
    - type: "icontains"
      value: "Premium Package"
      transform: "output.answer"
    - type: "faithfulness"
      threshold: 0.95
      transform: "output.answer"
      value: "Patients above 45 years old can purchase the Senior Package. Additionally, female patients above 45 years old are eligible to purchase the Premium Package."
    - type: "answer-relevance"
      threshold: 0.80
      transform: "output.answer"
