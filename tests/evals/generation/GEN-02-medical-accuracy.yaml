        Faithfulness Check:
        Compare against: "Possible symptoms of Covid-19 include fever, cough, shortness of breath, fatigue, body aches, loss of taste or smell, sore throat, and congestion."
        Explain your reasoning first, then provide the score.
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: |
        Answer Relevance: Did the bot provide a comprehensive list of symptoms as requested?
        Explain your reasoning first, then provide the score.

- description: "[GEN-02] Accuracy — Premium Package eligibility"
  vars:
    test_name: "GEN_MEDICAL_ACCURACY_006 | Accuracy - Premium Package Eligibility"
    username: "tienpham"
    request: "I am a 52-year-old woman. What medical package can I purchase?"
  assert:
    - type: "icontains"
      value: "Premium Package"
      transform: "output.answer"
    - type: "llm-rubric"
      threshold: 0.95
      transform: "output.answer"
      value: |
        Faithfulness Check:
        Compare against: "Patients above 45 years old can purchase the Senior Package. Additionally, female patients above 45 years old are eligible to purchase the Premium Package."
        Explain your reasoning first, then provide the score.
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: |
        Answer Relevance: Did the bot correctly identify the Premium Package based on age and gender?
        Explain your reasoning first, then provide the score.
