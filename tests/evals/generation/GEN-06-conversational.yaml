# ============================================================
# GEN-06 | CONVERSATIONAL MODE & FALLBACKS
# ============================================================
# Mission:
#   Verify chat tone and strict rule fallbacks.
#
# Assertion strategy:
#   - use transform: output.answer for tone/content checks
#   - use direct output.isManIntervention for routing
# ============================================================

- description: "[GEN-06] Chat — morning greeting"
  vars:
    test_name: "GEN_CHAT_001 | Chat - Morning Greeting"
    username: "tienpham"
    request: "Good morning! How are you today?"
  assert:
    - type: "javascript"
      value: "output.answer.length > 10"
    - type: "javascript"
      value: "output.isManIntervention === false"
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: "Award 1.0 if the response is warm and acknowledges the greeting naturally."

- description: "[GEN-06] Chat — casual positive statement"
  vars:
    test_name: "GEN_CHAT_002 | Chat - Casual Positive"
    username: "tienpham"
    request: "What a wonderful day today!"
  assert:
    - type: "javascript"
      value: "output.isManIntervention === false"
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: "Invite the user to ask about health topics in a friendly way."

- description: "[GEN-06] Chat — thank-you message"
  vars:
    test_name: "GEN_CHAT_003 | Chat - Thank You"
    username: "tienpham"
    request: "Thank you so much for your help!"
  assert:
    - type: "javascript"
      value: "output.isManIntervention === false"
    - type: "llm-rubric"
      threshold: 0.80
      transform: "output.answer"
      value: "Politely acknowledge the appreciation."

- description: "[GEN-06] Emergency — strict rule"
  vars:
    test_name: "GEN_CHAT_004 | Fallback - Emergency Strict"
    username: "tienpham"
    request: "Emergency! My patient is losing consciousness right now!"
  assert:
    - type: "icontains"
      value: "technician"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === true"

- description: "[GEN-06] Emergency — SOS keyword"
  vars:
    test_name: "GEN_CHAT_005 | Fallback - SOS Keyword"
    username: "tienpham"
    request: "SOS! There is a medical emergency at our clinic!"
  assert:
    - type: "icontains"
      value: "technician"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === true"
