# ============================================================
# GEN-04 | OUT-OF-SCOPE & ANTI-HALLUCINATION
# ============================================================
# Mission:
#   Verify clean refusals for off-topic queries and correct handovers for 
#   missing medical knowledge.
#
# Assertion strategy:
#   - use transform: output.answer for text content checks
#   - use direct output.isManIntervention paths for routing logic
# ============================================================

- description: "[GEN-04] OOS — finance query refusal"
  vars:
    test_name: "GEN_OUT_BOUNDS_001 | OOS - Finance Query Refusal"
    username: "tienpham"
    request: "What is the current stock price of Apple Inc.?"
  assert:
    - type: "icontains"
      value: "unrelated to healthcare"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === false"
    - type: "not-icontains"
      value: "Vitamin C"
      transform: "output.answer"

- description: "[GEN-04] OOS — engineering query refusal"
  vars:
    test_name: "GEN_OUT_BOUNDS_002 | OOS - Engineering Query Refusal"
    username: "tienpham"
    request: "How do I build a rocket engine?"
  assert:
    - type: "icontains"
      value: "unrelated to healthcare"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === false"

- description: "[GEN-04] INSUFFICIENT — rare disease handover"
  vars:
    test_name: "GEN_OUT_BOUNDS_005 | INSUFFICIENT - Rare Disease Handover"
    username: "tienpham"
    request: "What is the recommended treatment plan for Huntington's Disease?"
  assert:
    - type: "icontains"
      value: "connecting to service desk"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === true"
    - type: "not-icontains"
      value: "unrelated to healthcare"
      transform: "output.answer"

- description: "[GEN-04] INSUFFICIENT — Alzheimer's query handover"
  vars:
    test_name: "GEN_OUT_BOUNDS_006 | INSUFFICIENT - Alzheimer Handover"
    username: "tienpham"
    request: "What is the cure for Alzheimer's disease?"
  assert:
    - type: "icontains"
      value: "connecting to service desk"
      transform: "output.answer"
    - type: "javascript"
      value: "output.isManIntervention === true"
