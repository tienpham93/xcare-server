# ============================================================
# RETRIEVAL SUITE — Hot Topics Domain
# Ground Truth Source: prisma/seeds/knowledge/RETRIEVAL_HOT_TOPICS_topics.json
#   hot-topic-001: "Symptoms of Covid-19"
#     - Fever, cough, shortness of breath, fatigue, body aches
#     - Loss of taste or smell, sore throat, congestion
#   hot-topic-002: "Covid-19 Treatment and Prevention"
#     - Talk to healthcare provider if at higher risk
#     - Vaccinated is the first step to prevent severe illness
# Strategy: Unique symptoms ("shortness of breath", "loss of taste")
#           and prevention facts ("vaccinated") are precise probes.
# ============================================================

- description: "[RETRIEVAL|hot_topics] Covid symptom list — maps to hot-topic-001"
  vars:
    test_name: "RETRIEVAL_HOT_TOPICS_001 | Covid-19 Symptoms"
    username: "tienpham"
    request: "What are the symptoms of Covid-19?"
  assert:
    - type: "icontains"
      value: "shortness of breath"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|hot_topics] Covid prevention — maps to hot-topic-002"
  vars:
    test_name: "RETRIEVAL_HOT_TOPICS_002 | Covid-19 Prevention"
    username: "tienpham"
    request: "How can I prevent getting Covid-19?"
  assert:
    - type: "icontains"
      value: "vaccinated"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|hot_topics] Taste/smell loss — maps to hot-topic-001"
  vars:
    test_name: "RETRIEVAL_HOT_TOPICS_003 | Covid - Loss of Taste"
    username: "tienpham"
    request: "I lost my sense of taste and smell. Could this be Covid?"
  assert:
    - type: "javascript"
      value: 'output.toLowerCase().includes("covid") || output.toLowerCase().includes("covid-19")'
    - type: "not-icontains"
      value: "out of my knowledge"
