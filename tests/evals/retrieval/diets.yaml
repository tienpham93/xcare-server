# ============================================================
# RETRIEVAL SUITE — Diets Domain
# Ground Truth Source: prisma/seeds/knowledge/diets.json
#   diet-001: "Diet for Obesity Management"
#     - Less than 200mg cholesterol per day
#     - Limit high-fat foods, sugar, and alcohol
#   diet-002: "Diet for Diabetes Management"
#     - Avoid high-fat dairy (whole milk) and high sugary foods
#   diet-003: "Diet for Gout Management"
#     - Avoid red meats (beef), seafood, excess chicken or fish
#     - Causes high uric acid → triggers gout attacks
#   diet-004: "Diet for Multiple Diseases"
#     - Completely avoid alcohol
#     - Transition to vegetarian diet rich in vegetables
# Strategy: Unique medical terms (uric acid, cholesterol mg, whole milk)
#           are precision probes for each diet document.
# ============================================================

- description: "[RETRIEVAL|diets] Obesity cholesterol limit — maps to diet-001"
  vars:
    test_name: "DIET_001 | Obesity Diet"
    username: "tienpham"
    request: "I am obese. What kind of diet should I follow?"
  assert:
    - type: "icontains"
      value: "200 milligrams"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|diets] Diabetes dairy warning — maps to diet-002"
  vars:
    test_name: "DIET_002 | Diabetes Diet"
    username: "tienpham"
    request: "I have diabetes. What foods should I avoid?"
  assert:
    - type: "icontains"
      value: "whole milk"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|diets] Gout uric acid trigger — maps to diet-003"
  vars:
    test_name: "DIET_003 | Gout Diet"
    username: "tienpham"
    request: "I suffer from gout. What dietary restrictions should I follow?"
  assert:
    - type: "icontains"
      value: "uric acid"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|diets] Gout — beef probe for diet-003"
  vars:
    test_name: "DIET_004 | Gout - Red Meat Restriction"
    username: "tienpham"
    request: "Can I eat beef if I have gout?"
  assert:
    - type: "icontains"
      value: "red meats"
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL|diets] Multiple diseases vegetarian — maps to diet-004"
  vars:
    test_name: "DIET_005 | Multiple Disease Diet"
    username: "tienpham"
    request: "I have multiple health conditions at the same time. What diet do you recommend?"
  assert:
    - type: "icontains"
      value: "vegetarian"
    - type: "not-icontains"
      value: "out of my knowledge"
