# ============================================================
# RETRIEVAL SUITE
# Tests that validate the RAG retrieval pipeline via output grounding.
# If the right document was retrieved and used, its factual content
# will appear in the answer. This is the standard proxy for retrieval quality.
#
# Strategy:
#   - Check for specific facts that ONLY appear in the correct KB document
#   - If the answer contains those facts, retrieval succeeded
#   - If the answer hallucinates or falls back, retrieval failed
# ============================================================

- description: "[RETRIEVAL] Symptoms - Headache grounded in KB document"
  vars:
    test_name: "RETRIEVAL_001 | Symptom Grounding"
    username: "tienpham"
    request: "I have a persistent headache and I'm worried."
  assert:
    # The 'Treatment for Mild Symptoms' document contains both these facts.
    # If retrieved correctly, both should appear in the answer.
    - type: "icontains"
      value: "headache"
    - type: "icontains"
      value: "Vitamin C"
    # Must NOT fall back to the out-of-knowledge response
    - type: "not-icontains"
      value: "out of my knowledge"
    - type: "javascript"
      value: "output.length > 80"

- description: "[RETRIEVAL] Billing - Consultation cost grounded in KB"
  vars:
    test_name: "RETRIEVAL_002 | Billing Grounding"
    username: "tienpham"
    request: "How much does a consultation with a doctor cost?"
  assert:
    # bill-001 or bill-002 - either pricing doc proves billing retrieval succeeded
    - type: "javascript"
      value: 'output.includes("$") || output.toLowerCase().includes("free")'
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL] Emergency - Deterministic strict rule from service_desk KB"
  vars:
    test_name: "RETRIEVAL_003 | Deterministic Rule"
    username: "tienpham"
    request: "Emergency! I need help right now!"
  assert:
    # 'service_desk.json' strictAnswer = "Please wait for awhile! A technician will assist you shortly"
    # This exact phrase proves the strict rule was retrieved and used deterministically
    - type: "icontains"
      value: "technician"
    - type: "javascript"
      value: 'output.includes("isManIntervention") && (output.includes("true") || output.includes("True"))'
    # Must NOT be a general LLM hallucination
    - type: "not-icontains"
      value: "out of my knowledge"

- description: "[RETRIEVAL] Anti-Hallucination - No KB document retrieved for off-topic query"
  vars:
    test_name: "RETRIEVAL_004 | No Hallucination"
    username: "tienpham"
    request: "Where is the moon right now?"
  assert:
    # Proves the retrieval pipeline correctly found NO relevant document.
    # The bot must NOT output medical KB facts for a non-medical query.
    - type: "not-icontains"
      value: "Vitamin C"
    - type: "not-icontains"
      value: "headache"
    - type: "not-icontains"
      value: "$100"
    # The new deterministic fallback correctly identifies it's OUT_OF_SCOPE
    - type: "icontains"
      value: "unrelated to healthcare"

- description: "[RETRIEVAL] Missing KB - Handover for medical query with no KB"
  vars:
    test_name: "RETRIEVAL_005 | Missing Knowledge Handover"
    username: "tienpham"
    request: "What is the recommended treatment plan for Huntington's Disease?"
  assert:
    # Must hit the INSUFFICIENT Context deterministic handover
    - type: "icontains"
      value: "connecting to service desk team"
